<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title> Starbucks </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="logo.png" alt="Logo de Starbucks" class="logo">
        <div class="header-texto">
            <p>¡Disfrútalos!</p>
            <h1>Conoce nuestras bebidas y alimentos de temporada</h1>
        </div>
    </header>

    <main class="contenedor-principal">
        <h2>Bebidas</h2>
        <hr>

        <div class="menu-bebidas">

            <div class="tarjeta-bebida">
                <img src="bebidacaliente.png" alt="Bebida Caliente" class="img-bebida">
                <h3>Bebidas Calientes</h3>
            </div>

            <div class="tarjeta-bebida">
                <img src="frapuccino.png" alt="Frappuccino" class="img-bebida">
                <h3>Frappuccino</h3>
            </div>

            <div class="tarjeta-bebida">
                <img src="te.png" alt="Bebida Base Té" class="img-bebida">
                <h3>Bebidas Base Té</h3>
            </div>

            <div class="tarjeta-bebida">
                <img src="coldBrew.png" alt="Cold Brew" class="img-bebida">
                <h3>Cold Brew</h3>
            </div>
            <div class="Alimentos">
                <img src="al.png" alt="Alimentos" class="img-alimentos">
            </div>
        </div>
    </main>

</body>

</html>
