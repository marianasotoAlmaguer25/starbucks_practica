<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Starbucks Mariana - Proyecto Final</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="nav-left">
            <img src="logo.png" alt="Logo Starbucks" class="logo">
            <nav class="links">
                <a href="#">MENÚ</a>
                <a href="#">REWARDS</a>
                <a href="#">GIFT CARDS</a>
            </nav>
        </div>
        <div class="nav-right">
            <a href="#" class="find-store">Find a Store</a>
            <button class="btn btn-outline">Sign in</button>
            <button class="btn btn-dark">Join now</button>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1>¡Hola, Mariana!</h1>
            <h2>Qué gran día para un café.</h2>
            <button class="btn-order">Comienza tu orden</button>
        </div>
        <div class="hero-image">
            <img src="persona_bebida.jpg" alt="Mariana disfrutando un café">
        </div>
    </main>

    <section class="grid-bebidas">
        <div class="item">
            <img src="al.png" alt="Bebida AL">
            <p>Iced Coffee</p>
        </div>
        <div class="item">
            <img src="bebidaCaliente.png" alt="Bebida Caliente">
            <p>Hot Coffee</p>
        </div>
        <div class="item">
            <img src="coldBrew.png" alt="Cold Brew">
            <p>Cold Brew</p>
        </div>
        <div class="item">
            <img src="frapuccino.png" alt="Frapuccino">
            <p>Frappuccino®</p>
        </div>
        <div class="item">
            <img src="te.png" alt="Té">
            <p>Iced Tea</p>
        </div>
    </section>

</body>

</html>
