<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Starbucks - Mi Menú</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="barra-navegacion">
        <img src="logo.png" alt="Logo" class="logo-pequeño">
        <div class="links-flex">
            <a href="#">MENU</a>
            <a href="#">REWARDS</a>
        </div>
    </nav>

    <header class="hero-starbucks">
        <div class="mensaje-sticky">
            ¡Bebidas de temporada disponibles!
        </div>
        <h1>Conoce nuestras bebidas</h1>
    </header>

    <main class="contenedor-principal">
        <div class="grid-bebidas">

            <div class="tarjeta">
                <div class="circulo-relativo">
                    <img src="bebidaCaliente.png" class="img-absoluta" alt="Bebidas Calientes">
                </div>
                <h3>Bebidas Calientes</h3>
            </div>

            <div class="tarjeta">
                <div class="circulo-relativo">
                    <img src="frapuccino.png" class="img-absoluta" alt="Frappuccino">
                </div>
                <h3>Frappuccino</h3>
            </div>

            <div class="tarjeta">
                <div class="circulo-relativo">
                    <img src="coldBrew.png" class="img-absoluta" alt="Cold Brew">
                </div>
                <h3>Cold Brew</h3>
            </div>

            <div class="tarjeta">
                <div class="circulo-relativo">
                    <img src="te.png" class="img-absoluta" alt="Té de Hierbas">
                </div>
                <h3>Té de Hierbas</h3>
            </div>

            <div class="tarjeta">
                <div class="circulo-relativo">
                    <img src="al.png" class="img-absoluta" alt="Alimentos">
                </div>
                <h3>Alimentos de Temporada</h3>
            </div>

        </div>
    </main>

</body>

</html>
